services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    # volumes:
    #   - ./frontend/src:/app/src  # hot reload source changes

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - FLASK_ENV=development
    # volumes:
    #   - ./backend/app:/app  # mount source into container

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: homiely
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d homiely"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: